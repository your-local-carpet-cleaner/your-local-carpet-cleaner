<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Before and after carpet steam cleaning illustration, Sutherland Sydney living room</title>
  <desc id="heroDesc">Illustrated living room rug split by a clean wipe line, dull and stained on the left, bright and restored on the right, with a sofa and rising steam representing carpet and upholstery cleaning.</desc>
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#103B38"/>
      <stop offset="100%" stop-color="#155349"/>
    </linearGradient>
    <linearGradient id="cleanRug" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7FE6D8"/>
      <stop offset="100%" stop-color="#3FB8A9"/>
    </linearGradient>
    <linearGradient id="dirtyRug" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6E5A47"/>
      <stop offset="100%" stop-color="#564536"/>
    </linearGradient>
    <linearGradient id="swoosh" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8643A"/>
      <stop offset="100%" stop-color="#F08A5D"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#skyGrad)"/>

  <!-- floor -->
  <rect x="0" y="520" width="1600" height="380" fill="#0C2E2B"/>

  <!-- dirty side rug (left) -->
  <g>
    <ellipse cx="430" cy="700" rx="430" ry="150" fill="url(#dirtyRug)"/>
    <ellipse cx="430" cy="700" rx="430" ry="150" fill="none" stroke="#3F3327" stroke-width="6" opacity="0.5"/>
    <!-- stains -->
    <ellipse cx="260" cy="660" rx="46" ry="26" fill="#3B2E22" opacity="0.55"/>
    <ellipse cx="540" cy="730" rx="60" ry="30" fill="#3B2E22" opacity="0.45"/>
    <ellipse cx="360" cy="760" rx="34" ry="18" fill="#3B2E22" opacity="0.5"/>
    <!-- dust flecks -->
    <circle cx="200" cy="600" r="3" fill="#A89478" opacity="0.6"/>
    <circle cx="300" cy="580" r="2.5" fill="#A89478" opacity="0.6"/>
    <circle cx="150" cy="650" r="2" fill="#A89478" opacity="0.6"/>
  </g>

  <!-- clean side rug (right) -->
  <g>
    <ellipse cx="1170" cy="700" rx="430" ry="150" fill="url(#cleanRug)"/>
    <ellipse cx="1170" cy="700" rx="430" ry="150" fill="none" stroke="#1C6F66" stroke-width="6" opacity="0.4"/>
    <!-- subtle fiber lines -->
    <g stroke="#E9FFFA" stroke-width="2" opacity="0.35">
      <line x1="850" y1="690" x2="1480" y2="690"/>
      <line x1="830" y1="720" x2="1500" y2="720"/>
      <line x1="870" y1="660" x2="1460" y2="660"/>
    </g>
    <!-- shine sparkles -->
    <g fill="#FFFFFF" opacity="0.85">
      <path d="M1280 610 l6 16 16 6 -16 6 -6 16 -6 -16 -16 -6 16 -6 z"/>
      <path d="M1080 760 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z"/>
    </g>
  </g>

  <!-- the wipe swoosh divider (signature element) -->
  <path d="M780 520 C 840 600, 760 760, 830 900 L 940 900 C 880 760, 950 600, 900 520 Z" fill="url(#swoosh)" opacity="0.95"/>
  <path d="M790 520 C 850 600, 770 760, 840 900" fill="none" stroke="#FAF7F1" stroke-width="4" opacity="0.6"/>

  <!-- steam wisps rising from the clean side -->
  <g fill="none" stroke="#CFFBF1" stroke-width="8" stroke-linecap="round" opacity="0.55">
    <path d="M1120 560 C 1100 500, 1150 470, 1130 410 C 1115 365, 1150 340, 1140 300"/>
    <path d="M1230 580 C 1210 520, 1260 490, 1240 430 C 1225 385, 1260 360, 1250 320"/>
  </g>

  <!-- sofa silhouette, upper right -->
  <g transform="translate(1230,200)">
    <rect x="0" y="60" width="260" height="110" rx="22" fill="#0C2E2B"/>
    <rect x="-10" y="40" width="50" height="100" rx="18" fill="#0C2E2B"/>
    <rect x="220" y="40" width="50" height="100" rx="18" fill="#0C2E2B"/>
    <rect x="10" y="20" width="240" height="60" rx="20" fill="#11403B"/>
    <circle cx="35" cy="175" r="10" fill="#0A2522"/>
    <circle cx="225" cy="175" r="10" fill="#0A2522"/>
    <!-- sparkle on sofa to suggest freshly cleaned -->
    <path d="M150 40 l5 13 13 5 -13 5 -5 13 -5 -13 -13 -5 13 -5 z" fill="#7FE6D8"/>
  </g>

  <!-- small house outline top-left for context -->
  <g opacity="0.18" stroke="#FAF7F1" stroke-width="4" fill="none">
    <path d="M90 200 L160 130 L230 200 V 280 H 90 Z"/>
  </g>
</svg>
